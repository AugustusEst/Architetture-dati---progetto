        arguments:
          contractId: transaction-log
          prefix: create250

    - label: create-500-tps
      description: CreateTransaction 500 TPS
      txNumber: 5000
      rateControl:
        type: fixed-rate
        opts:
          tps: 500
      workload:
        module: caliper/workloads/createTransaction.js
        arguments:
          contractId: transaction-log
          prefix: create500


    - label: read-1000-tps
      description: ReadTransaction 1000 TPS
      txNumber: 10000
      rateControl:
        type: fixed-rate
        opts:
          tps: 1000
      workload:
        module: caliper/workloads/readTransaction.js
        arguments:
          contractId: transaction-log
          prefix: read1000
          assetCount: 100

