test:
  name: transaction-log-benchmark
  description: Benchmark Hyperledger Fabric transaction-log chaincode
  workers:
    number: 2
  rounds:
    - label: create-100-tps
      description: CreateTransaction 100 TPS
      txNumber: 1000
      rateControl:
        type: fixed-rate
        opts:
          tps: 100
      workload:
        module: caliper/workloads/createTransaction.js
        arguments:
          contractId: transaction-log
          prefix: create100

    - label: create-250-tps
      description: CreateTransaction 250 TPS
      txNumber: 2500
      rateControl:
        type: fixed-rate
        opts:
          tps: 250
      workload:
